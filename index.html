<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飲んだ？</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f7f5f0;
    color: #1a1a1a;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    padding: 32px 20px 60px;
  }
  .container { max-width: 400px; margin: 0 auto; }
  h1 { font-size: 28px; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 6px; }
  .subtitle { font-size: 12px; color: #999; font-family: 'DM Mono', monospace; margin-bottom: 32px; }

  .perm-bar {
    background: #fff; border: 1.5px solid #e0ddd6; border-radius: 12px;
    padding: 14px 16px; display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 24px; gap: 12px;
  }
  .perm-bar.ok { border-color: #b5e5a0; background: #f4fbf1; }
  .perm-bar.no { border-color: #f5c0c0; background: #fff8f8; }
  .perm-text { font-size: 13px; font-weight: 700; }
  .perm-sub { font-size: 11px; color: #aaa; margin-top: 2px; }
  .btn-perm {
    background: #1a1a1a; color: #fff; border: none; border-radius: 8px;
    padding: 8px 14px; font-size: 12px; font-weight: 700;
    font-family: 'Zen Kaku Gothic New', sans-serif; cursor: pointer; white-space: nowrap; flex-shrink: 0;
  }

  .section-label {
    font-size: 11px; font-family: 'DM Mono', monospace;
    letter-spacing: 0.2em; color: #aaa; text-transform: uppercase; margin-bottom: 10px;
  }
  .notify-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 32px; }
  .notify-item {
    background: #fff; border: 1.5px solid #e0ddd6; border-radius: 12px;
    padding: 14px 16px; display: flex; align-items: center;
    justify-content: space-between; gap: 12px; transition: border-color 0.2s, opacity 0.2s;
  }
  .notify-item.future { opacity: 0.4; }
  .notify-item.checked { border-color: #b5e5a0; background: #f4fbf1; opacity: 0.6; }
  .notify-left { display: flex; align-items: center; gap: 12px; }
  .notify-time { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; min-width: 56px; }
  .notify-name { font-size: 14px; font-weight: 700; color: #333; }
  .notify-status { font-size: 11px; color: #bbb; margin-top: 2px; font-family: 'DM Mono', monospace; }

  .check-wrap { width: 26px; height: 26px; flex-shrink: 0; }
  .check-wrap input { display: none; }
  .check-box {
    width: 26px; height: 26px; border: 2px solid #ccc; border-radius: 6px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; background: #fff; font-size: 14px; user-select: none;
  }
  .check-wrap input:checked + .check-box { background: #3db85a; border-color: #3db85a; color: #fff; }
  .check-wrap input:disabled + .check-box { background: #f0f0f0; border-color: #ddd; cursor: not-allowed; color: #ccc; }

  .unchecked-section { margin-top: 8px; }
  .unchecked-label { font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 0.2em; color: #e07070; text-transform: uppercase; margin-bottom: 10px; }
  .unchecked-list { display: flex; flex-direction: column; gap: 8px; }
  .unchecked-item {
    background: #fff5f5; border: 1.5px solid #f5c0c0; border-radius: 12px;
    padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
  }
  .unchecked-time { font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 500; color: #e07070; }
  .unchecked-name { font-size: 13px; font-weight: 700; color: #c05050; }
  .unchecked-check {
    width: 26px; height: 26px; border: 2px solid #f5a0a0; border-radius: 6px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    background: #fff; font-size: 14px; transition: all 0.15s; flex-shrink: 0;
  }
  .unchecked-check:hover { background: #ffe0e0; }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: #1a1a1a; color: #fff; font-size: 13px; font-weight: 700;
    padding: 10px 20px; border-radius: 999px; opacity: 0;
    transition: all 0.25s; pointer-events: none; white-space: nowrap; z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="container">
  <h1>飲んだ？💊</h1>
  <div class="subtitle">毎日のお薬チェック</div>

  <div class="perm-bar" id="permBar">
    <div>
      <div class="perm-text" id="permTitle">🔔 通知を許可してね</div>
      <div class="perm-sub" id="permSub">時間になったらお知らせするよ</div>
    </div>
    <button class="btn-perm" id="permBtn" onclick="requestPerm()">許可する</button>
  </div>

  <div class="section-label">今日のスケジュール</div>
  <div class="notify-list" id="notifyList"></div>

  <div class="unchecked-section" id="uncheckedSection" style="display:none">
    <div class="unchecked-label">⚠ まだ飲んでない</div>
    <div class="unchecked-list" id="uncheckedList"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SCHEDULES = [
  { id: 1, hour: 7,  minute: 30, label: '07:30' },
  { id: 2, hour: 20, minute: 0,  label: '20:00' },
  { id: 3, hour: 21, minute: 0,  label: '21:00' },
];
const NAME = '飲んだ？';
const STORAGE_KEY = 'nonda_checks';

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function loadChecks() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const data = raw ? JSON.parse(raw) : {};
    const key = todayKey();
    Object.keys(data).forEach(k => { if (k !== key) delete data[k]; });
    return data[key] || {};
  } catch { return {}; }
}

function saveCheck(id, val) {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const data = raw ? JSON.parse(raw) : {};
    const key = todayKey();
    if (!data[key]) data[key] = {};
    data[key][id] = val;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch {}
}

async function requestPerm() {
  const r = await Notification.requestPermission();
  updatePermBar(r);
}

function updatePermBar(perm) {
  const bar = document.getElementById('permBar');
  const title = document.getElementById('permTitle');
  const sub = document.getElementById('permSub');
  const btn = document.getElementById('permBtn');
  bar.className = 'perm-bar';
  if (perm === 'granted') {
    bar.classList.add('ok');
    title.textContent = '✅ 通知オン';
    sub.textContent = '時間になったら知らせるね';
    btn.style.display = 'none';
  } else if (perm === 'denied') {
    bar.classList.add('no');
    title.textContent = '❌ 通知がブロックされてる';
    sub.textContent = 'ブラウザ設定から許可してね';
    btn.style.display = 'none';
  }
}

function getStatus(s, now) {
  const target = new Date(now);
  target.setHours(s.hour, s.minute, 0, 0);
  return now < target ? 'future' : 'past';
}

function render() {
  const now = new Date();
  const checks = loadChecks();
  const list = document.getElementById('notifyList');
  list.innerHTML = '';
  const uncheckedItems = [];

  SCHEDULES.forEach(s => {
    const isFuture = getStatus(s, now) === 'future';
    const isChecked = !!checks[s.id];

    const item = document.createElement('div');
    item.className = 'notify-item' + (isFuture ? ' future' : '') + (isChecked ? ' checked' : '');

    const statusText = isFuture ? 'まだ時間じゃないよ'
      : isChecked ? 'チェック済み ✓'
      : '通知済み — チェックしてね';

    item.innerHTML = `
      <div class="notify-left">
        <div class="notify-time">${s.label}</div>
        <div>
          <div class="notify-name">${NAME}</div>
          <div class="notify-status">${statusText}</div>
        </div>
      </div>
      <label class="check-wrap">
        <input type="checkbox" ${isChecked ? 'checked' : ''} ${isFuture ? 'disabled' : ''} data-id="${s.id}">
        <div class="check-box">${isChecked ? '✓' : ''}</div>
      </label>
    `;
    list.appendChild(item);

    item.querySelector('input').addEventListener('change', e => {
      saveCheck(parseInt(e.target.dataset.id), e.target.checked);
      showToast(e.target.checked ? '飲んだの記録したよ！' : 'チェックを外したよ');
      render();
    });

    if (!isFuture && !isChecked) uncheckedItems.push(s);
  });

  const section = document.getElementById('uncheckedSection');
  const ucList = document.getElementById('uncheckedList');
  ucList.innerHTML = '';

  if (uncheckedItems.length > 0) {
    section.style.display = 'block';
    uncheckedItems.forEach(s => {
      const div = document.createElement('div');
      div.className = 'unchecked-item';
      div.innerHTML = `
        <div>
          <div class="unchecked-time">${s.label}</div>
          <div class="unchecked-name">${NAME}</div>
        </div>
        <div class="unchecked-check" data-id="${s.id}">✓</div>
      `;
      div.querySelector('.unchecked-check').addEventListener('click', e => {
        saveCheck(parseInt(e.currentTarget.dataset.id), true);
        showToast('飲んだの記録したよ！');
        render();
      });
      ucList.appendChild(div);
    });
  } else {
    section.style.display = 'none';
  }
}

const lastFired = {};
function checkNotify() {
  if (Notification.permission !== 'granted') return;
  const now = new Date();
  SCHEDULES.forEach(s => {
    const key = `${s.id}_${todayKey()}`;
    if (lastFired[key]) return;
    if (s.hour === now.getHours() && s.minute === now.getMinutes() && now.getSeconds() < 10) {
      new Notification(NAME, { body: `${s.label} の時間だよ！` });
      lastFired[key] = true;
    }
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

updatePermBar(Notification.permission);
render();
setInterval(() => { checkNotify(); render(); }, 10000);
</script>
</body>
</html>
